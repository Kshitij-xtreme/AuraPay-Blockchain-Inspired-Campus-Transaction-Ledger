# Configuration for AuraPay

# Blockchain Configuration
blockchain.difficulty=3
blockchain.maxBlockSize=100
blockchain.maxTransactionsPerBlock=100

# Transaction Pool Configuration
transactionPool.maxSize=1000
transactionPool.minFeeAmount=0.01
transactionPool.maxFeeAmount=100000.0

# Security Configuration
security.hashAlgorithm=SHA-256
security.enableTransactionSigning=true
security.passwordIterations=100000
security.saltLength=16

# Storage Configuration
storage.dataDirectory=./data
storage.enablePersistence=true
storage.persistenceInterval=300000

# API Configuration
api.port=8080
api.enableLogging=true
api.corsEnabled=true
api.maxRequestSize=10485760

# System Configuration
system.networkName=AuraPay Campus Network
system.version=1.0.0
system.environment=development
